function schedCard(g){
  const fin=g.st==='final',topW=fin&&g.sc[0]>g.sc[1],botW=fin&&g.sc[1]>g.sc[0];
  let pickResult='';
  if(fin){const aw=g.sc[0]>g.sc[1]?0:1;pickResult=aw===g.pk?'correct':'wrong';}
  return`<div class="mc">
<div class="mc-header"><span class="mc-time">${g.time} ET</span><span class="mc-tv">${g.tv}</span><span class="mc-region-tag tag-${g.rg}">${g.rg}</span><span class="mc-status ${g.st}">${fin?'Final':g.rd}</span></div>
<div class="tr${topW?' w':''}${fin&&!topW?' l':''}"><span class="seed">${g.t.s}</span><span class="tn">${g.t.n}</span>${fin?`<span class="score">${g.sc[0]}</span>`:''}${!fin&&g.pk===0?'<span class="pick-badge our-pick">Our Pick</span>':''}${topW?'<span class="check">✓</span>':''}${fin&&g.pk===0?`<span class="pick-badge ${pickResult}">${pickResult==='correct'?'✓':pickResult==='wrong'?'✗':''}</span>`:''}</div>
<div class="tr${botW?' w':''}${fin&&!botW?' l':''}"><span class="seed">${g.b.s}</span><span class="tn">${g.b.n}</span>${fin?`<span class="score">${g.sc[1]}</span>`:''}${!fin&&g.pk===1?'<span class="pick-badge our-pick">Our Pick</span>':''}${botW?'<span class="check">✓</span>':''}${fin&&g.pk===1?`<span class="pick-badge ${pickResult}">${pickResult==='correct'?'✓':pickResult==='wrong'?'✗':''}</span>`:''}</div>
</div>`;}

function renderSchedule(){
  let h='';const days={};let dayIdx=0;
  S.forEach(g=>{if(!days[g.day])days[g.day]=[];days[g.day].push(g);});
  for(const[day,games]of Object.entries(days)){
    const done=games.filter(g=>g.st==='final').length;
    const allDone=done===games.length;
    const hasPending=games.some(g=>g.st!=='final');
    const id='day'+dayIdx++;
    const cor=games.filter(g=>{if(g.st!=='final'||!g.sc)return false;const aw=g.sc[0]>g.sc[1]?0:1;return aw===g.pk;}).length;
    const wr=done-cor;
    const scoreTag=allDone?` <span style="color:var(--win)">${cor}✓</span> <span style="color:var(--loss)">${wr}✗</span>`:'';
    h+=`<div class="day-header${allDone?' collapsed':''}" onclick="toggleDay('${id}')" id="hdr-${id}">${day}<span class="day-count">${games[0].rd} • ${done}/${games.length}${scoreTag}</span><span class="chevron">▼</span></div><div class="day-games matchup-grid${allDone?' collapsed':''}" id="${id}">${games.map(schedCard).join('')}</div>`;
  }
  const future=[{d:"Sat, Mar 28",l:"Elite 8"},{d:"Sun, Mar 29",l:"Elite 8"},{d:"Sat, Apr 4",l:"Final Four — 6:00 & 8:30 PM ET on TBS"},{d:"Mon, Apr 6",l:"Championship — 8:30 PM ET on TBS"}];
  future.forEach(f=>{if(!days[f.d])h+=`<div class="day-header" style="opacity:0.4;cursor:default">${f.d}<span class="day-count">${f.l} • TBD</span></div>`;});
  return h;
}

  let h=`<div class="region-title-bar"><span class="region-title" style="color:#f472b6">Jasmeen's Mascot Bets</span><span class="region-site">Picking winners by mascot energy</span></div>`;
  h+=`<div class="stats-bar">
<div class="stat-card"><div class="stat-value" style="color:#f472b6">${wins}-${losses}</div><div class="stat-label">Record</div></div>
<div class="stat-card"><div class="stat-value" style="color:${pct>=70?'var(--win)':'var(--loss)'}">${pct}%</div><div class="stat-label">Win Rate</div></div>
<div class="stat-card"><div class="stat-value" style="font-size:20px;color:var(--win)">Billikens</div><div class="stat-label">Best Pick (102-77)</div></div>
<div class="stat-card"><div class="stat-value" style="font-size:20px;color:var(--loss)">Cougars</div><div class="stat-label">Only Miss (BYU)</div></div></div>`;
  h+=`<div class="round-section"><div class="round-label">All Mascot Picks</div><div class="matchup-grid">`;
  J.forEach(j=>{
    const won=j.result==='W';
    h+=`<div class="mc" style="${won?'border-color:rgba(52,211,153,0.3)':'border-color:rgba(248,113,113,0.3)'}">
<div class="mc-header"><span class="mc-time" style="font-size:13px;color:#f472b6">${j.mascot}</span><span class="mc-region-tag tag-${j.region}">${j.region}</span><span class="mc-status ${won?'final':'pending'}" style="${won?'':'color:var(--loss);background:var(--loss-bg)'}">${won?'✓ Won':'✗ Lost'}</span></div>
<div class="tr${won?' w':''}"><span class="seed">${j.seed}</span><span class="tn">${j.team}</span><span class="score">${j.score.split('-')[0]}</span></div>
<div class="tr${won?'':' w'}"><span class="seed">${j.oppSeed}</span><span class="tn">${j.opp}</span><span class="score">${j.score.split('-')[1]}</span></div>
</div>`;
  });
  h+=`</div></div>`;
  return h;
}

const ct=document.getElementById('content');
function go(r){let h='<div class="panel active">';if(r==='schedule')h+=renderSchedule();else if(r==='overview')h+=renderOverview();else if(r==='final4')h+=renderF4();else if(r==='jasmeen')h+=renderJasmeen();else h+=renderRegion(r);h+='</div>';ct.innerHTML=h;}
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('.nav-btn');if(!b)return;document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');go(b.dataset.region);});
go('schedule');
</script>
</body>
</html>
